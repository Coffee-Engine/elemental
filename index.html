<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemental</title>
    <link rel="stylesheet" href="site/styles.css"></link>
</head>
<body>
    <script src="dist/elemental.js"></script>
    <script src="dist/colorPicker.js"></script>
    <script src="dist/ambientVideo.js"></script>
    <p>Cool neat elements</p>
    <!--
    <h3>slider</h3>
    <slider min="0" max="100"></slider>
    -->

    <h3>color-picker</h3>
    <p>A simple, customizable color picker. (WIP)</p>
    <color-picker value="#ff0000" alpha></color-picker>
    <color-picker value="#00ff00" gradient></color-picker>
    <color-picker value="#0000ff" gradient alpha></color-picker>
    <color-picker value="#00ffff"></color-picker>
    <color-picker value="#ff00ff" swatch></color-picker>
    <color-picker value="#ffff00" swatch alpha></color-picker>
    <color-picker value="#ffffff" swatch alpha gradient></color-picker>
    <color-picker value="#000000" swatch gradient></color-picker>

    <h3>ambient-video</h3>
    <p>A video source with an ambient glow.</p>
    <p style="font-size: large; opacity: 50%;">I'm going to be honest, this is just so I can name this and have a repo.</p>
    <ambient-video src="site/video.mp4" controls fadespeed="1"></ambient-video>
</body>
</html>
