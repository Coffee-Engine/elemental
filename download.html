<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize</title>
    <link rel="stylesheet" href="site/styles.css"></link>
    <style>
        button {
            background-color: #09090f;
            
            border-color: #ffefef;
            border-style: solid;
            border-radius: 8px;

            color: #ffefef;

            transition: 300ms border-radius;
        }

        button:hover {
            border-radius: 12px;
        }

        button:active {
            border-radius: 0px;
            transition: 0ms border-radius;
        }
    </style>
</head>
<body>
    <h2>Download effective as a library!</h2>
    <p style="font-size: large; opacity: 50%;">This is a very simple page isn't it?</p>
    
    <h3>Elements</h3>
    <div id="elementContainer"></div>
    <button id="download">Download</button>

    <script src="site/downloadPage.js"></script>
</body>
</html>
